# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  # Local Postgres settings
  PGDATA: results/pgdata
  PGPORT: "5432"
  PGDATABASE: tracking
  PGUSER: tracker
  PGPASSWORD: dev
  PG_URI: "postgresql://{{.PGUSER}}:{{.PGPASSWORD}}@127.0.0.1:{{.PGPORT}}/{{.PGDATABASE}}"
  # Container runtime (docker or podman)
  CONTAINER_RT: docker
  # Tofu shorthand
  TOFU: tofu -chdir=infra/tofu

tasks:
  # ---------- OpenTofu ----------

  tpu:init:
    desc: Initialize OpenTofu in infra/tofu
    cmds:
      - "{{.TOFU}} init"

  tpu:plan:
    desc: Plan OpenTofu changes
    cmds:
      - "{{.TOFU}} plan"

  tpu:apply:
    desc: Apply OpenTofu changes
    cmds:
      - "{{.TOFU}} apply"

  tpu:destroy:
    desc: Destroy all OpenTofu-managed resources
    cmds:
      - "{{.TOFU}} destroy"

  tpu:ssh:
    desc: SSH to TPU VM
    cmds:
      - gcloud compute tpus tpu-vm ssh "$({{.TOFU}} output -raw name)" --zone "$({{.TOFU}} output -raw zone)"

  tpu:start:
    desc: Start TPU VM
    cmds:
      - gcloud compute tpus tpu-vm start "$({{.TOFU}} output -raw name)" --zone "$({{.TOFU}} output -raw zone)"

  tpu:stop:
    desc: Stop TPU VM
    cmds:
      - gcloud compute tpus tpu-vm stop "$({{.TOFU}} output -raw name)" --zone "$({{.TOFU}} output -raw zone)"

  tpu:sync:
    desc: Sync tracked and non-ignored files to TPU VM
    cmds:
      - sh -lc 'git ls-files -z --cached --others --exclude-standard | tar --null -T - -cf - | gcloud compute tpus tpu-vm ssh "$({{.TOFU}} output -raw name)" --zone "$({{.TOFU}} output -raw zone)" --command "mkdir -p ~/jaxley-extracellular && tar -xf - -C ~/jaxley-extracellular"'

  # ---------- Local Postgres ----------

  tracking:db:
    desc: Start local Postgres via nix (no container needed)
    cmds:
      - |
        if [ ! -d "{{.PGDATA}}" ]; then
          echo "Initializing Postgres data directory..."
          nix shell nixpkgs#postgresql -c initdb -D "{{.PGDATA}}" --no-locale -E UTF8 -U "{{.PGUSER}}"
        fi
      - |
        echo "Starting Postgres on port {{.PGPORT}}..."
        nix shell nixpkgs#postgresql -c pg_ctl -D "{{.PGDATA}}" -l "{{.PGDATA}}/server.log" \
          -o "-p {{.PGPORT}} -k /tmp" start
      - |
        sleep 1
        if ! nix shell nixpkgs#postgresql -c psql -h /tmp -p {{.PGPORT}} -U "{{.PGUSER}}" -lqt | grep -qw "{{.PGDATABASE}}"; then
          nix shell nixpkgs#postgresql -c createdb -h /tmp -p {{.PGPORT}} -U "{{.PGUSER}}" "{{.PGDATABASE}}"
          echo "Created database '{{.PGDATABASE}}'"
        fi
        echo "Postgres ready: {{.PG_URI}}"

  tracking:db:stop:
    desc: Stop local Postgres
    cmds:
      - nix shell nixpkgs#postgresql -c pg_ctl -D "{{.PGDATA}}" stop

  tracking:db:container:
    desc: Start local Postgres in a container
    cmds:
      - |
        {{.CONTAINER_RT}} rm -f mlflow-pg 2>/dev/null || true
        {{.CONTAINER_RT}} run -d --name mlflow-pg \
          -p {{.PGPORT}}:5432 \
          -e POSTGRES_DB={{.PGDATABASE}} \
          -e POSTGRES_USER={{.PGUSER}} \
          -e POSTGRES_PASSWORD={{.PGPASSWORD}} \
          -v "$(pwd)/{{.PGDATA}}-container:/var/lib/postgresql/data" \
          postgres:16
        echo "Postgres container ready: {{.PG_URI}}"

  tracking:db:container:stop:
    desc: Stop local Postgres container
    cmds:
      - "{{.CONTAINER_RT}} stop mlflow-pg"

  # ---------- Tracking server (local) ----------

  tracking:server:
    desc: Start tracking server (local Postgres + local artifacts)
    cmds:
      - mkdir -p results/mlartifacts
      - mlflow server --backend-store-uri "{{.PG_URI}}" --default-artifact-root ./results/mlartifacts --host 127.0.0.1 --port 5000

  # ---------- Tracking server (remote) ----------

  tracking:remote:start:
    desc: Start the remote tracking server instance
    cmds:
      - gcloud compute instances start "$({{.TOFU}} output -raw name)-tracking" --zone "$({{.TOFU}} output -raw zone)"
      - echo "Tracking server starting at $({{.TOFU}} output -raw tracking_server_external_url)"

  tracking:remote:stop:
    desc: Stop the remote tracking server instance
    cmds:
      - gcloud compute instances stop "$({{.TOFU}} output -raw name)-tracking" --zone "$({{.TOFU}} output -raw zone)"

  tracking:remote:ssh:
    desc: SSH to the remote tracking server
    cmds:
      - gcloud compute ssh "$({{.TOFU}} output -raw name)-tracking" --zone "$({{.TOFU}} output -raw zone)"

  tracking:remote:url:
    desc: Print the remote tracking server URL
    cmds:
      - echo "Internal (VPC):  $({{.TOFU}} output -raw tracking_server_url)"
      - echo "External:        $({{.TOFU}} output -raw tracking_server_external_url)"

  tracking:remote:logs:
    desc: Tail the tracking server logs
    cmds:
      - gcloud compute ssh "$({{.TOFU}} output -raw name)-tracking" --zone "$({{.TOFU}} output -raw zone)" --command "journalctl -u tracking-server -f"

  # ---------- UI ----------

  tracking:ui:
    desc: Open local tracking UI in browser
    cmds:
      - echo "Tracking UI at http://127.0.0.1:5000"
      - xdg-open http://127.0.0.1:5000 2>/dev/null || open http://127.0.0.1:5000 2>/dev/null || true

  tracking:remote:ui:
    desc: Open remote tracking UI in browser
    vars:
      URL:
        sh: "{{.TOFU}} output -raw tracking_server_external_url"
    cmds:
      - echo "Tracking UI at {{.URL}}"
      - xdg-open "{{.URL}}" 2>/dev/null || open "{{.URL}}" 2>/dev/null || true
