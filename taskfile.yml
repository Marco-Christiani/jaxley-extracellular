# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  # Local Postgres settings
  PGDATA: results/pgdata
  PGPORT: "5432"
  PGDATABASE: tracking
  PGUSER: tracker
  PGPASSWORD: dev
  PG_URI: "postgresql://{{.PGUSER}}:{{.PGPASSWORD}}@127.0.0.1:{{.PGPORT}}/{{.PGDATABASE}}"
  # Container runtime (docker or podman)
  CONTAINER_RT: docker
  # Tofu shorthand
  TOFU: tofu -chdir=infra/tofu
  # Tracking server port (must match tracking_server_port in variables.tf)
  TRACKING_PORT: "5000"

tasks:
  # ---------- Infrastructure (OpenTofu) ----------

  infra:init:
    desc: Initialize OpenTofu
    cmds:
      - "{{.TOFU}} init"

  infra:plan:
    desc: Plan OpenTofu changes
    cmds:
      - "{{.TOFU}} plan"

  infra:apply:
    desc: Apply all OpenTofu changes
    cmds:
      - "{{.TOFU}} apply"

  infra:destroy:
    desc: Destroy all OpenTofu-managed resources (including data stores)
    prompt:
      - This will destroy all cloud resources including Cloud SQL and GCS artifacts. Continue?
      - Are you sure?
    cmds:
      - "{{.TOFU}} destroy"

  # ---------- Remote: TPU ----------

  remote:tpu:up:
    desc: Provision TPU VM via OpenTofu
    cmds:
      - "{{.TOFU}} apply -var='enable_tpu=true'"

  remote:tpu:down:
    desc: Destroy TPU VM only (leaves tracking stack intact)
    prompt: This will destroy the TPU VM. Continue?
    cmds:
      - "{{.TOFU}} destroy -target=google_tpu_v2_vm.this[0]"

  remote:tpu:start:
    desc: Start (resume) a stopped TPU VM without reprovisioning
    cmds:
      - gcloud compute tpus tpu-vm start "$({{.TOFU}} output -raw tpu_name)" --zone "$({{.TOFU}} output -raw zone)"

  remote:tpu:stop:
    desc: Stop (pause) TPU VM without destroying it
    cmds:
      - gcloud compute tpus tpu-vm stop "$({{.TOFU}} output -raw tpu_name)" --zone "$({{.TOFU}} output -raw zone)"

  remote:tpu:ssh:
    desc: SSH to TPU VM
    cmds:
      - gcloud compute tpus tpu-vm ssh "$({{.TOFU}} output -raw tpu_name)" --zone "$({{.TOFU}} output -raw zone)"

  remote:tpu:sync:
    desc: Sync tracked and non-ignored files to TPU VM
    cmds:
      - sh -lc 'git ls-files -z --cached --others --exclude-standard | tar --null -T - -cf - | gcloud compute tpus tpu-vm ssh "$({{.TOFU}} output -raw tpu_name)" --zone "$({{.TOFU}} output -raw zone)" --command "mkdir -p ~/jaxley-extracellular && tar -xf - -C ~/jaxley-extracellular"'

  # ---------- Remote: tracking ----------

  remote:tracking:up:
    desc: Start the remote tracking server (GCE instance)
    cmds:
      - gcloud compute instances start "$({{.TOFU}} output -raw tracking_server_name)" --zone "$({{.TOFU}} output -raw zone)"

  remote:tracking:down:
    desc: Stop the remote tracking server (GCE instance)
    cmds:
      - gcloud compute instances stop "$({{.TOFU}} output -raw tracking_server_name)" --zone "$({{.TOFU}} output -raw zone)"

  remote:tracking:ui:
    desc: Tunnel MLflow UI to localhost:5000 via IAP (ctrl-c to close)
    cmds:
      - echo "MLflow UI at http://localhost:5000 (ctrl-c to close tunnel)"
      - gcloud compute start-iap-tunnel "$({{.TOFU}} output -raw tracking_server_name)" {{.TRACKING_PORT}} --local-host-port=localhost:5000 --zone "$({{.TOFU}} output -raw zone)"

  remote:tracking:ssh:
    desc: SSH to the remote tracking server via IAP
    cmds:
      - gcloud compute ssh "$({{.TOFU}} output -raw tracking_server_name)" --zone "$({{.TOFU}} output -raw zone)" --tunnel-through-iap

  remote:tracking:logs:
    desc: Tail tracking server logs via IAP
    cmds:
      - gcloud compute ssh "$({{.TOFU}} output -raw tracking_server_name)" --zone "$({{.TOFU}} output -raw zone)" --tunnel-through-iap --command "journalctl -u tracking-server -f"

  # ---------- Local tracking (dev) ----------

  local:db:
    desc: Start local Postgres via nix
    cmds:
      - |
        if [ ! -d "{{.PGDATA}}" ]; then
          echo "Initializing Postgres data directory..."
          nix shell nixpkgs#postgresql -c initdb -D "{{.PGDATA}}" --no-locale -E UTF8 -U "{{.PGUSER}}"
        fi
      - |
        echo "Starting Postgres on port {{.PGPORT}}..."
        nix shell nixpkgs#postgresql -c pg_ctl -D "{{.PGDATA}}" -l "{{.PGDATA}}/server.log" \
          -o "-p {{.PGPORT}} -k /tmp" start
      - |
        sleep 1
        if ! nix shell nixpkgs#postgresql -c psql -h /tmp -p {{.PGPORT}} -U "{{.PGUSER}}" -lqt | grep -qw "{{.PGDATABASE}}"; then
          nix shell nixpkgs#postgresql -c createdb -h /tmp -p {{.PGPORT}} -U "{{.PGUSER}}" "{{.PGDATABASE}}"
          echo "Created database '{{.PGDATABASE}}'"
        fi
        echo "Postgres ready: {{.PG_URI}}"

  local:db:stop:
    desc: Stop local Postgres
    cmds:
      - nix shell nixpkgs#postgresql -c pg_ctl -D "{{.PGDATA}}" stop

  local:db:container:
    desc: Start local Postgres in a container
    cmds:
      - |
        {{.CONTAINER_RT}} rm -f mlflow-pg 2>/dev/null || true
        {{.CONTAINER_RT}} run -d --name mlflow-pg \
          -p {{.PGPORT}}:5432 \
          -e POSTGRES_DB={{.PGDATABASE}} \
          -e POSTGRES_USER={{.PGUSER}} \
          -e POSTGRES_PASSWORD={{.PGPASSWORD}} \
          -v "$(pwd)/{{.PGDATA}}-container:/var/lib/postgresql/data" \
          postgres:16
        echo "Postgres container ready: {{.PG_URI}}"

  local:db:container:stop:
    desc: Stop local Postgres container
    cmds:
      - "{{.CONTAINER_RT}} stop mlflow-pg"

  local:server:
    desc: Start MLflow server against local Postgres
    cmds:
      - mkdir -p results/mlartifacts
      - mlflow server --backend-store-uri "{{.PG_URI}}" --default-artifact-root ./results/mlartifacts --host 127.0.0.1 --port 5000

  local:ui:
    desc: Open local MLflow UI in browser
    cmds:
      - echo "MLflow UI at http://127.0.0.1:5000"
      - xdg-open http://127.0.0.1:5000 2>/dev/null || open http://127.0.0.1:5000 2>/dev/null || true
